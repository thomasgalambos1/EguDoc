apiVersion: apps/v1
kind: Deployment
metadata:
  name: egudoc
  namespace: egudoc
  labels:
    app: egudoc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: egudoc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: egudoc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
    spec:
      serviceAccountName: egudoc
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: egudoc
          image: ghcr.io/eguilde/egudoc:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: egudoc-config
            - secretRef:
                name: egudoc-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [egudoc]
                topologyKey: kubernetes.io/hostname
